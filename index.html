<!DOCTYPE html>
<html>
<head>
    <title>CleanCore Invoice Validator</title>
    <style>
        body { font-family: Arial; background: #f5f7fb; padding: 40px; }
        .box { background: white; padding: 25px; border-radius: 12px; max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 220px; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 10px; }
        button { padding: 12px 20px; margin-top: 15px; cursor: pointer; }
        pre { background: #111827; color: #e5e7eb; padding: 15px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="box">
    <h1>CleanCore Invoice Validator</h1>

    <label>API Key</label>
    <input type="text" id="apiKey" placeholder="Paste your API key here">

    <label>Invoice JSON</label>
    <textarea id="invoiceInput">
{
  "invoice_number": "INV-9001",
  "supplier_id": "SUP-100",
  "po_number": "PO-1001",
  "header_amount": 200,
  "items": [
    {
      "line_no": 1,
      "po_line": 10,
      "quantity": 2,
      "unit_price": 100,
      "line_amount": 200
    }
  ]
}
    </textarea>

    <button onclick="validateInvoice()">Validate Invoice</button>
    <button onclick="upgrade()">Upgrade to PRO</button>

    <h3>Result</h3>
    <pre id="result">Result will appear here...</pre>
</div>

<script>
const BASE_URL = "https://clean-core-validation-api-production.up.railway.app";

async function validateInvoice() {
    try {
        const apiKey = document.getElementById("apiKey").value.trim();
        const invoiceText = document.getElementById("invoiceInput").value;
        const invoice = JSON.parse(invoiceText);

        const response = await fetch(`${BASE_URL}/validate-invoice`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": apiKey
            },
            body: JSON.stringify(invoice)
        });

        const data = await response.json();

        document.getElementById("result").textContent =
            JSON.stringify(data, null, 2);

    } catch (error) {
        document.getElementById("result").textContent =
            "ERROR: " + error.message;
    }
}

async function upgrade() {
    try {
        const apiKey = document.getElementById("apiKey").value.trim();

        const response = await fetch(`${BASE_URL}/create-checkout-session`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                api_key: apiKey,
                plan: "PRO"
            })
        });

        const data = await response.json();

        if (data.checkout_url) {
            window.location.href = data.checkout_url;
        } else {
            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        }

    } catch (error) {
        document.getElementById("result").textContent =
            "ERROR: " + error.message;
    }
}
</script>

</body>
</html>
